<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Secure Employee Portal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: linear-gradient(135deg, #1a1a2e, #0f3460); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: white; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); padding: 40px; width: 100%; max-width: 420px; }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 { font-size: 22px; color: #1a1a2e; margin-top: 10px; }
        .logo p { font-size: 13px; color: #888; margin-top: 4px; }
        .badge { display: inline-flex; align-items: center; gap: 6px; background: #e8f5e9; color: #2e7d32; padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; margin-bottom: 20px; }
        .alert { padding: 12px 16px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; }
        .alert-error { background: #fce4ec; color: #c62828; border: 1px solid #ef9a9a; }
        .alert-success { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 14px; font-weight: 600; color: #333; margin-bottom: 6px; }
        input[type="text"], input[type="password"] { width: 100%; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 15px; outline: none; }
        input:focus { border-color: #1a73e8; }
        button { width: 100%; padding: 14px; background: #1a73e8; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; }
        button:hover { background: #1557b0; }
        .hint { margin-top: 24px; padding: 16px; background: #f5f5f5; border-radius: 8px; font-size: 13px; color: #555; }
        .hint h3 { font-size: 13px; color: #333; margin-bottom: 8px; }
        .hint code { background: #e0e0e0; padding: 2px 6px; border-radius: 4px; font-size: 12px; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">
        <div style="font-size:48px;">&#128274;</div>
        <h1>Secure Employee Portal</h1>
        <p>MSCS-632 — Secure Software Development</p>
    </div>
    <div style="text-align:center;"><span class="badge">&#128274; HTTPS Secured</span></div>
    <div th:if="${param.error}" class="alert alert-error">Invalid username or password.</div>
    <div th:if="${param.logout}" class="alert alert-success">Logged out successfully.</div>
    <form th:action="@{/login}" method="post">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Enter username" required autofocus>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter password" required>
        </div>
        <button type="submit">Sign In</button>
    </form>
    <div class="hint">
        <h3>Demo Credentials:</h3>
        <p><strong>Admin:</strong> <code>hradmin</code> / <code>Admin@2024Secure</code></p>
        <p><strong>User:</strong> <code>employee</code> / <code>Emp@2024Secure</code></p>
        <p><strong>Manager:</strong> <code>manager</code> / <code>Mgr@2024Secure</code></p>
    </div>
</div>
</body>
</html>
